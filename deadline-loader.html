<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deadline Loader</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <style>
    /* ─────────────────────────────────────────────
       Design tokens — edit values here only
       ───────────────────────────────────────────── */
    :root {
      --color-bg:           #000000;
      --color-primary:      #be002a;
      --color-character:    #fefffe;

      --duration-cycle:     20s;
      --duration-arm-swing: 1.2s;

      --font-label:         'Oswald', sans-serif;
      --scene-width:        581px;
      --scene-height:       158px;
    }

    /* ─────────────────────────────────────────────
       Reset & base
       ───────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background-color: var(--color-bg);
    }

    /* ─────────────────────────────────────────────
       Scene
       ───────────────────────────────────────────── */
    .scene {
      position: relative;
      width: var(--scene-width);
      max-width: 100%;
      height: var(--scene-height);
    }

    .scene__svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ─────────────────────────────────────────────
       Progress fill
       ───────────────────────────────────────────── */
    .progress-fill {
      animation: anim-progress var(--duration-cycle) linear infinite;
    }

    /* ─────────────────────────────────────────────
       Death — walk & limb swing
       ───────────────────────────────────────────── */
    .death-group {
      animation: anim-walk var(--duration-cycle) ease infinite;
    }

    /* Arm and tool share one keyframe — they move as
       a single unit (the scythe is held in the hand). */
    .death-arm,
    .death-tool {
      transform-box:    fill-box;
      transform-origin: 0% 50%;        /* shoulder pivot */
      animation:        anim-arm-swing var(--duration-arm-swing) ease-in-out infinite;
    }

    /* ─────────────────────────────────────────────
       Designer — writing arm
       JS overrides animation-duration to ramp speed
       ───────────────────────────────────────────── */
    .designer-arm-group {
      transform-box:    fill-box;
      transform-origin: 0% 50%;        /* shoulder pivot */
      animation:        anim-write var(--duration-cycle) ease infinite;
    }

    /* ─────────────────────────────────────────────
       Flames
       ───────────────────────────────────────────── */
    .flame {
      opacity: 0;
      transform-origin: center bottom;
    }

    .flame--red {
      animation:
        anim-flame-show  var(--duration-cycle) ease    infinite,
        anim-flame-red   120ms                 ease    infinite;
    }

    .flame--yellow {
      animation:
        anim-flame-show   var(--duration-cycle) ease   infinite,
        anim-flame-yellow 120ms                 ease   infinite;
    }

    .flame--white {
      animation:
        anim-flame-show  var(--duration-cycle) ease    infinite,
        anim-flame-red   100ms                 ease    infinite;
    }

    /* ─────────────────────────────────────────────
       Deadline label
       ───────────────────────────────────────────── */
    .deadline-label {
      position:    relative;
      width:       110px;
      height:      22px;
      margin:      0 auto;
      overflow:    hidden;
      color:       transparent;   /* parent has no direct text; masks handle colour */
      font-family: var(--font-label);
      font-size:   0.95rem;
      letter-spacing: 0.03em;
      text-align:  center;
      white-space: nowrap;
    }

    /* Two stacked masks create a colour-wipe effect.
       Both are absolutely positioned and fill the parent.
       The red mask grows from width:0 → 98%, clipping its coloured
       copy of the text. The white mask sits behind and is always full-width.
       The .inner inside each mask is full-width so the text never wraps
       or shifts as the mask grows. */
    .deadline-label__mask {
      position:   absolute;
      top:        0;
      left:       0;
      height:     100%;
      overflow:   hidden;
      white-space: nowrap;
    }

    .deadline-label__mask--white {
      width: 100%;
      color: var(--color-character);
      z-index: 1;
    }

    .deadline-label__mask--red {
      width:            0;
      color:            var(--color-primary);
      background-color: var(--color-bg);
      animation:        anim-label-wipe var(--duration-cycle) linear infinite;
      z-index:          2;
    }

    .deadline-label__inner {
      display:    block;
      width:      110px;   /* match parent .deadline-label width */
      text-align: center;
    }

    /* ─────────────────────────────────────────────
       Keyframes
       ───────────────────────────────────────────── */

    @keyframes anim-progress {
      from { x: -100%; }
      to   { x: -3%;   }
    }

    @keyframes anim-walk {
      0%   { transform: translateX(0px);   }
      6%   { transform: translateX(0px);   }
      10%  { transform: translateX(100px); }
      15%  { transform: translateX(140px); }
      25%  { transform: translateX(170px); }
      35%  { transform: translateX(220px); }
      45%  { transform: translateX(280px); }
      55%  { transform: translateX(340px); }
      65%  { transform: translateX(370px); }
      75%  { transform: translateX(430px); }
      85%  { transform: translateX(460px); }
      100% { transform: translateX(520px); }
    }

    /* Single pendulum — shared by arm + tool */
    @keyframes anim-arm-swing {
      0%   { transform: rotate(-25deg); }
      50%  { transform: rotate(20deg);  }
      100% { transform: rotate(-25deg); }
    }

    @keyframes anim-write {
      0%   { transform: rotate(0deg);   }
      16%  { transform: rotate(-8deg);  }
      32%  { transform: rotate(0deg);   }
      48%  { transform: rotate(-10deg); }
      65%  { transform: rotate(0deg);   }
      83%  { transform: rotate(-7deg);  }
      100% { transform: rotate(0deg);   }
    }

    @keyframes anim-label-wipe {
      from { width: 0;   }
      to   { width: 98%; }
    }

    @keyframes anim-flame-show {
      0%,  74% { opacity: 0; }
      80%, 99% { opacity: 1; }
      100%     { opacity: 0; }
    }

    @keyframes anim-flame-red {
      0%   { transform: translateY(-30px) scale(1,   1);   }
      25%  { transform: translateY(-30px) scale(1.1, 1.1); }
      75%  { transform: translateY(-30px) scale(0.8, 0.7); }
      100% { transform: translateY(-30px) scale(1,   1);   }
    }

    @keyframes anim-flame-yellow {
      0%   { transform: translateY(-30px) scale(0.8, 0.7); }
      50%  { transform: translateY(-30px) scale(1.1, 1.2); }
      100% { transform: translateY(-30px) scale(1,   1);   }
    }
  </style>
</head>

  <script>
    (() => {
      'use strict';

      /* ── Config (single source of truth) ─────── */
      const CONFIG = Object.freeze({
        /** Total cycle duration in seconds. Must match CSS --duration-cycle. */
        cycleDuration: 20,
        /** Starting day count shown in the label. */
        totalDays: 7,
        /**
         * Writing-speed ramp schedule for the designer arm.
         * Each entry: [delayMs, animationDuration]
         * Simulates mounting deadline pressure.
         */
        writeRamp: [
          [    0, '1.5s'],
          [ 4000,   '1s'],
          [ 8000, '0.7s'],
          [12000, '0.3s'],
          [15000, '0.2s'],
        ],
      });

      /* ── DOM refs (resolved once at boot) ─────── */
      const els = {
        progressFill: document.querySelector('.progress-fill'),
        deathGroup:   document.querySelector('.death-group'),
        designerArm:  document.getElementById('js-designer-arm'),
        flames:       [...document.querySelectorAll('.flame')],
        // Masks are pre-built in HTML — resolved directly, no dynamic build step
        maskRed:  document.querySelector('.deadline-label__mask--red'),
        daySpans: [...document.querySelectorAll('.deadline-label__day')],
      };

      /* ── Utilities ──────────────────────────────  */

      /**
       * Update one slot in a comma-separated animation-duration list.
       * Used to change the cycle-length of a compound animation
       * without clobbering its other durations (e.g. the flicker).
       *
       * @param {Element} el
       * @param {string}  duration  New duration string, e.g. "20s"
       * @param {number}  [slot=0]  Zero-based index into the list
       */
      function setAnimationDurationSlot(el, duration, slot = 0) {
        const durations = getComputedStyle(el)
          .animationDuration
          .split(',')
          .map(s => s.trim());
        durations[slot] = duration;
        el.style.animationDuration = durations.join(', ');
      }

      /* ── Setup ──────────────────────────────────  */

      /**
       * Push the cycle duration to every element whose animation
       * must stay synchronised with the global loop.
       */
      function applyGlobalDuration() {
        const dur = `${CONFIG.cycleDuration}s`;

        [els.progressFill, els.deathGroup, els.maskRed].forEach(el => {
          el.style.animationDuration = dur;
        });

        // Flames use two animations (show + flicker); only slot 0 tracks the cycle.
        els.flames.forEach(el => setAnimationDurationSlot(el, dur, 0));
      }

      /* ── Per-cycle logic ────────────────────────  */

      /**
       * Schedule timed speed increases on the designer's writing arm.
       * Returns a cancel function that clears all pending timeouts.
       *
       * @returns {() => void}
       */
      function scheduleWritingRamp() {
        const ids = CONFIG.writeRamp.map(([delay, duration]) =>
          setTimeout(() => {
            els.designerArm.style.animationDuration = duration;
          }, delay)
        );
        return () => ids.forEach(clearTimeout);
      }

      /**
       * Count the day display down from totalDays → 0 over one cycle.
       * Resets the display before the next cycle begins.
       * Returns a cancel function.
       *
       * @returns {() => void}
       */
      function startDayCountdown() {
        const totalMs   = CONFIG.cycleDuration * 1000;
        const tickMs    = totalMs / CONFIG.totalDays;
        let   remaining = CONFIG.totalDays;

        // Show 7 immediately at cycle start
        els.daySpans.forEach(span => { span.textContent = remaining; });

        const intervalId = setInterval(() => {
          remaining -= 1;
          els.daySpans.forEach(span => { span.textContent = remaining; });

          if (remaining === 0) {
            clearInterval(intervalId);
            // Reset to 7 just before the next cycle fires
            setTimeout(
              () => els.daySpans.forEach(span => {
                span.textContent = CONFIG.totalDays;
              }),
              tickMs - 50
            );
          }
        }, tickMs);

        return () => clearInterval(intervalId);
      }

      /**
       * Run one full animation cycle.
       * CSS handles its own infinite looping; JS only manages the
       * discrete state changes (writing speed ramp + day countdown).
       *
       * @returns {() => void} cancel — tears down all timers for this cycle
       */
      function runCycle() {
        const cancelRamp      = scheduleWritingRamp();
        const cancelCountdown = startDayCountdown();
        return () => { cancelRamp(); cancelCountdown(); };
      }

      /* ── Boot ───────────────────────────────────  */
      function init() {
        applyGlobalDuration();
        runCycle();

        // JS cycle timer — CSS animations loop on their own
        setInterval(runCycle, CONFIG.cycleDuration * 1000);
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
